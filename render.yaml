services:
  - type: web
    name: vrp-routing-service
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/generate_data.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///data/synthetic.db
      - key: PYTHON_VERSION
        value: 3.11.11
