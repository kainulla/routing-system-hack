<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Маршрутизация спецтехники</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e1e4e8; }

    .layout { display: grid; grid-template-columns: 360px 1fr; grid-template-rows: auto 1fr; height: 100vh; }

    header {
      grid-column: 1 / -1;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; }
    .status-info { font-size: 12px; color: #8b949e; }

    .sidebar {
      background: #161b22;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      padding: 16px;
    }

    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab {
      flex: 1; padding: 8px; text-align: center; font-size: 12px; font-weight: 500;
      background: transparent; border: 1px solid #30363d; color: #8b949e;
      cursor: pointer; border-radius: 6px; transition: all .15s;
    }
    .tab.active { background: #21262d; color: #e1e4e8; border-color: #58a6ff; }
    .tab:hover:not(.active) { border-color: #484f58; }

    .panel { display: none; }
    .panel.active { display: block; }

    label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; margin-top: 12px; }
    select, input {
      width: 100%; padding: 8px 10px; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; color: #e1e4e8; font-size: 13px; outline: none;
    }
    select:focus, input:focus { border-color: #58a6ff; }

    .btn {
      width: 100%; margin-top: 16px; padding: 10px; font-size: 13px; font-weight: 600;
      background: #238636; border: 1px solid #2ea043; color: #fff;
      border-radius: 6px; cursor: pointer; transition: background .15s;
    }
    .btn:hover { background: #2ea043; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .result-card {
      margin-top: 12px; padding: 12px; background: #0d1117;
      border: 1px solid #30363d; border-radius: 8px;
    }
    .result-card h4 { font-size: 13px; margin-bottom: 8px; color: #58a6ff; }
    .result-card .metric { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
    .result-card .metric .val { color: #58a6ff; font-weight: 600; }
    .result-card .reason { font-size: 11px; color: #8b949e; margin-top: 4px; line-height: 1.4; }
    .score-bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 6px; }
    .score-bar .fill { height: 100%; border-radius: 2px; background: #58a6ff; }

    .savings-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600;
      background: rgba(56, 139, 253, .15); color: #58a6ff;
    }
    .savings-badge.good { background: rgba(63, 185, 80, .15); color: #3fb950; }

    .group-header { font-size: 13px; font-weight: 600; margin-top: 12px; padding: 8px; background: #21262d; border-radius: 6px; }
    .stop-item { font-size: 12px; padding: 6px 8px; border-left: 2px solid #30363d; margin-left: 12px; }
    .stop-item .uwi { color: #58a6ff; }

    #map { background: #0d1117; }

    .task-row {
      display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end;
      padding: 8px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; margin-top: 8px;
    }
    .task-row .remove { background: none; border: none; color: #f85149; cursor: pointer; font-size: 18px; padding: 4px; }

    .error-msg { color: #f85149; font-size: 12px; margin-top: 8px; }

    .coord-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <div class="status-dot" id="statusDot"></div>
      <h1>Маршрутизация спецтехники</h1>
      <div class="status-info" id="statusInfo">Загрузка...</div>
    </header>

    <div class="sidebar">
      <div class="tabs">
        <div class="tab active" data-panel="recommend">Подбор</div>
        <div class="tab" data-panel="route">Маршрут</div>
        <div class="tab" data-panel="multitask">Мультизадача</div>
      </div>

      <!-- RECOMMEND PANEL -->
      <div class="panel active" id="panel-recommend">
        <label>Скважина назначения</label>
        <select id="rec-well"></select>

        <label>Приоритет</label>
        <select id="rec-priority">
          <option value="high">Высокий</option>
          <option value="medium" selected>Средний</option>
          <option value="low">Низкий</option>
        </select>

        <label>Плановое начало</label>
        <input type="datetime-local" id="rec-start">

        <label>Длительность (часы)</label>
        <input type="number" id="rec-duration" value="4.5" step="0.5" min="0.5">

        <button class="btn" id="rec-btn">Найти технику</button>
        <div id="rec-error" class="error-msg"></div>
        <div id="rec-results"></div>
      </div>

      <!-- ROUTE PANEL -->
      <div class="panel" id="panel-route">
        <label>Откуда</label>
        <div class="coord-group">
          <input type="number" id="route-from-lon" placeholder="Долгота" step="0.01">
          <input type="number" id="route-from-lat" placeholder="Широта" step="0.01">
        </div>
        <label>Куда</label>
        <div class="coord-group">
          <input type="number" id="route-to-lon" placeholder="Долгота" step="0.01">
          <input type="number" id="route-to-lat" placeholder="Широта" step="0.01">
        </div>
        <p style="font-size:11px;color:#8b949e;margin-top:8px;">Нажмите на карту, чтобы задать точки Откуда/Куда.</p>
        <button class="btn" id="route-btn">Построить маршрут</button>
        <div id="route-error" class="error-msg"></div>
        <div id="route-results"></div>
      </div>

      <!-- MULTITASK PANEL -->
      <div class="panel" id="panel-multitask">
        <label>Скважины (задачи)</label>
        <div id="mt-task-list"></div>
        <button class="btn" style="background:#21262d;border-color:#30363d;margin-top:8px;" id="mt-add-task">+ Добавить скважину</button>

        <label>Макс. коэф. объезда</label>
        <input type="number" id="mt-detour" value="1.4" step="0.1" min="1.0" max="3.0">

        <button class="btn" id="mt-btn">Оптимизировать</button>
        <div id="mt-error" class="error-msg"></div>
        <div id="mt-results"></div>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script>
    const API = '';
    let vehicles = [], wells = [], wellsWithCoords = [];
    let map, routeLayer, markerLayer;
    let clickMode = null;

    async function init() {
      // Fetch data first, then init map
      const [healthRes, vehiclesRes, wellsRes] = await Promise.all([
        fetch(`${API}/health`).then(r => r.json()),
        fetch(`${API}/api/vehicles`).then(r => r.json()),
        fetch(`${API}/api/wells`).then(r => r.json()),
      ]);

      vehicles = vehiclesRes;
      wells = wellsRes;
      wellsWithCoords = wells.filter(w => w.latitude != null && w.longitude != null);

      // Compute center from vehicles
      let centerLat = 49.6, centerLon = 59.2;
      if (vehicles.length > 0) {
        centerLat = vehicles.reduce((s, v) => s + v.lat, 0) / vehicles.length;
        centerLon = vehicles.reduce((s, v) => s + v.lon, 0) / vehicles.length;
      } else if (wellsWithCoords.length > 0) {
        centerLat = wellsWithCoords.reduce((s, w) => s + w.latitude, 0) / wellsWithCoords.length;
        centerLon = wellsWithCoords.reduce((s, w) => s + w.longitude, 0) / wellsWithCoords.length;
      }

      map = L.map('map').setView([centerLat, centerLon], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
      routeLayer = L.layerGroup().addTo(map);
      markerLayer = L.layerGroup().addTo(map);

      map.on('click', onMapClick);

      // Set default route coords from first vehicle
      if (vehicles.length > 0) {
        document.getElementById('route-from-lon').value = vehicles[0].lon.toFixed(4);
        document.getElementById('route-from-lat').value = vehicles[0].lat.toFixed(4);
      }
      if (wellsWithCoords.length > 0) {
        document.getElementById('route-to-lon').value = wellsWithCoords[0].longitude.toFixed(4);
        document.getElementById('route-to-lat').value = wellsWithCoords[0].latitude.toFixed(4);
      }

      // Set default planned start to now
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('rec-start').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

      document.getElementById('statusDot').style.background = '#3fb950';
      document.getElementById('statusInfo').textContent =
        `${healthRes.nodes} узлов | ${healthRes.edges} рёбер | ${healthRes.vehicles} ед. техники | ${healthRes.wells} скважин`;

      populateSelects();
      showWellsAndVehicles();
    }

    function populateSelects() {
      // Populate well selector for recommendations
      const recWell = document.getElementById('rec-well');
      wellsWithCoords.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w.uwi;
        opt.textContent = `${w.uwi} — ${w.well_name || 'Без имени'}`;
        recWell.appendChild(opt);
      });

      addMultitaskRow();
    }

    function showWellsAndVehicles() {
      wellsWithCoords.forEach(w => {
        L.circleMarker([w.latitude, w.longitude], {
          radius: 4, color: '#3fb950', fillColor: '#3fb950', fillOpacity: 0.6, weight: 1
        }).bindPopup(`<b>${w.uwi}</b><br>${w.well_name || ''}`).addTo(markerLayer);
      });
      vehicles.forEach(v => {
        L.circleMarker([v.lat, v.lon], {
          radius: 6, color: '#58a6ff', fillColor: '#58a6ff', fillOpacity: 0.8, weight: 2
        }).bindPopup(`<b>${v.name}</b><br>${v.vehicle_type}<br>ID: ${v.wialon_id}`).addTo(markerLayer);
      });
    }

    // -- Tabs --
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.panel}`).classList.add('active');
      });
    });

    // -- Map Click --
    function onMapClick(e) {
      const activePanel = document.querySelector('.tab.active').dataset.panel;
      if (activePanel !== 'route') return;
      const lon = e.latlng.lng.toFixed(4);
      const lat = e.latlng.lat.toFixed(4);
      if (!clickMode || clickMode === 'from') {
        document.getElementById('route-from-lon').value = lon;
        document.getElementById('route-from-lat').value = lat;
        clickMode = 'to';
      } else {
        document.getElementById('route-to-lon').value = lon;
        document.getElementById('route-to-lat').value = lat;
        clickMode = 'from';
      }
    }

    // -- Recommend --
    document.getElementById('rec-btn').addEventListener('click', async () => {
      const btn = document.getElementById('rec-btn');
      const errEl = document.getElementById('rec-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Поиск...';

      const wellUwi = document.getElementById('rec-well').value;
      if (!wellUwi) {
        errEl.textContent = 'Выберите скважину';
        btn.disabled = false;
        btn.textContent = 'Найти технику';
        return;
      }

      const body = {
        task_id: 'manual-' + Date.now(),
        priority: document.getElementById('rec-priority').value,
        destination_uwi: wellUwi,
        planned_start: document.getElementById('rec-start').value + ':00',
        planned_duration_hours: parseFloat(document.getElementById('rec-duration').value),
      };

      try {
        const res = await fetch(`${API}/api/recommendations`, {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Ошибка запроса');
        }
        const data = await res.json();
        renderRecommendations(data);
      } catch (e) {
        errEl.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Найти технику';
      }
    });

    function renderRecommendations(data) {
      const container = document.getElementById('rec-results');
      container.innerHTML = '';
      routeLayer.clearLayers();

      if (!data.units.length) {
        container.innerHTML = '<div class="result-card"><h4>Техника не найдена</h4></div>';
        return;
      }

      data.units.forEach((u, i) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        const pct = Math.round(u.score * 100);
        card.innerHTML = `
          <h4>#${i + 1} ${u.name}</h4>
          <div class="metric"><span>Рейтинг</span><span class="val">${pct}%</span></div>
          <div class="score-bar"><div class="fill" style="width:${pct}%"></div></div>
          <div class="metric"><span>Расстояние</span><span class="val">${u.distance_km.toFixed(1)} км</span></div>
          <div class="metric"><span>Прибытие</span><span class="val">${u.eta_minutes.toFixed(0)} мин</span></div>
          <div class="metric"><span>Wialon ID</span><span class="val">${u.wialon_id}</span></div>
          <div class="reason">${u.reason}</div>
        `;
        card.style.cursor = 'pointer';
        card.addEventListener('click', () => showVehicleRoute(u));
        container.appendChild(card);
      });

      showVehicleRoute(data.units[0]);
    }

    async function showVehicleRoute(u) {
      const vehicle = vehicles.find(v => v.wialon_id === u.wialon_id);
      if (!vehicle) return;
      const wellUwi = document.getElementById('rec-well').value;
      const well = wells.find(w => w.uwi === wellUwi);
      if (!well || well.longitude == null || well.latitude == null) return;

      try {
        const res = await fetch(`${API}/api/route`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            from: { wialon_id: vehicle.wialon_id, lon: vehicle.lon, lat: vehicle.lat },
            to: { uwi: well.uwi, lon: well.longitude, lat: well.latitude }
          })
        });
        if (!res.ok) return;
        const data = await res.json();
        drawRoute(data.coords);
      } catch (_) {}
    }

    // -- Route --
    document.getElementById('route-btn').addEventListener('click', async () => {
      const btn = document.getElementById('route-btn');
      const errEl = document.getElementById('route-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Расчёт...';

      const body = {
        from: {
          lon: parseFloat(document.getElementById('route-from-lon').value),
          lat: parseFloat(document.getElementById('route-from-lat').value),
        },
        to: {
          lon: parseFloat(document.getElementById('route-to-lon').value),
          lat: parseFloat(document.getElementById('route-to-lat').value),
        },
      };

      try {
        const res = await fetch(`${API}/api/route`, {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Ошибка запроса');
        }
        const data = await res.json();
        renderRoute(data);
        drawRoute(data.coords);
      } catch (e) {
        errEl.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Построить маршрут';
      }
    });

    function renderRoute(data) {
      const container = document.getElementById('route-results');
      container.innerHTML = `
        <div class="result-card">
          <h4>Результат маршрута</h4>
          <div class="metric"><span>Расстояние</span><span class="val">${data.distance_km.toFixed(1)} км</span></div>
          <div class="metric"><span>Время в пути</span><span class="val">${data.time_minutes.toFixed(0)} мин</span></div>
          <div class="metric"><span>Узлов маршрута</span><span class="val">${data.nodes.length}</span></div>
          <div class="metric"><span>Точек координат</span><span class="val">${data.coords.length}</span></div>
        </div>
      `;
    }

    function drawRoute(pathCoords) {
      routeLayer.clearLayers();
      if (!pathCoords || !pathCoords.length) return;

      const latlngs = pathCoords.map(c => [c[1], c[0]]);
      L.polyline(latlngs, { color: '#f0883e', weight: 4, opacity: 0.9 }).addTo(routeLayer);

      L.circleMarker(latlngs[0], { radius: 8, color: '#3fb950', fillColor: '#3fb950', fillOpacity: 1, weight: 2 })
        .bindPopup('Старт').addTo(routeLayer);
      L.circleMarker(latlngs[latlngs.length - 1], { radius: 8, color: '#f85149', fillColor: '#f85149', fillOpacity: 1, weight: 2 })
        .bindPopup('Назначение').addTo(routeLayer);

      map.fitBounds(L.latLngBounds(latlngs).pad(0.1));
    }

    // -- Multitask --
    function addMultitaskRow() {
      const list = document.getElementById('mt-task-list');
      const row = document.createElement('div');
      row.className = 'task-row';
      const sel = document.createElement('select');
      sel.className = 'mt-task-select';
      wellsWithCoords.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w.uwi;
        opt.textContent = `${w.uwi} — ${w.well_name || 'Без имени'}`;
        sel.appendChild(opt);
      });
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove';
      removeBtn.innerHTML = '&times;';
      removeBtn.onclick = () => { if (list.children.length > 1) row.remove(); };
      row.appendChild(sel);
      row.appendChild(removeBtn);
      list.appendChild(row);
    }

    document.getElementById('mt-add-task').addEventListener('click', addMultitaskRow);

    document.getElementById('mt-btn').addEventListener('click', async () => {
      const btn = document.getElementById('mt-btn');
      const errEl = document.getElementById('mt-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Оптимизация...';

      const taskIds = [];
      document.querySelectorAll('.mt-task-select').forEach(sel => {
        taskIds.push(sel.value);
      });

      const body = {
        task_ids: taskIds,
        constraints: {
          max_detour_ratio: parseFloat(document.getElementById('mt-detour').value),
        },
      };

      try {
        const res = await fetch(`${API}/api/multitask`, {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Ошибка запроса');
        }
        const data = await res.json();
        renderMultitask(data);
      } catch (e) {
        errEl.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Оптимизировать';
      }
    });

    function renderMultitask(data) {
      const container = document.getElementById('mt-results');
      routeLayer.clearLayers();
      const savingsClass = data.savings_percent >= 5 ? 'good' : '';

      let html = `
        <div class="result-card">
          <h4>Результат оптимизации</h4>
          <div class="metric"><span>Стратегия</span></div>
          <div class="reason">${data.strategy_summary}</div>
          <div class="metric"><span>Базовый пробег</span><span class="val">${data.baseline_distance_km.toFixed(1)} км</span></div>
          <div class="metric"><span>Оптимизированный</span><span class="val">${data.total_distance_km.toFixed(1)} км</span></div>
          <div class="metric"><span>Базовое время</span><span class="val">${data.baseline_time_minutes.toFixed(0)} мин</span></div>
          <div class="metric"><span>Оптимизированное время</span><span class="val">${data.total_time_minutes.toFixed(0)} мин</span></div>
          <div class="metric"><span>Экономия</span><span class="savings-badge ${savingsClass}">${data.savings_percent.toFixed(1)}%</span></div>
          <div class="reason">${data.reason}</div>
        </div>
      `;

      data.groups.forEach((group, gi) => {
        html += `<div class="group-header">Группа ${gi + 1} &mdash; ${group.length} задач(и)</div>`;
        group.forEach((uwi, i) => {
          html += `<div class="stop-item">${i + 1}. <span class="uwi">${uwi}</span></div>`;
        });
      });

      container.innerHTML = html;

      // Show well destinations on map
      const allPts = [];
      data.groups.forEach(group => {
        group.forEach(uwi => {
          const w = wellsWithCoords.find(w => w.uwi === uwi);
          if (w) {
            L.marker([w.latitude, w.longitude]).bindPopup(`<b>${uwi}</b><br>${w.well_name || ''}`).addTo(routeLayer);
            allPts.push([w.latitude, w.longitude]);
          }
        });
      });
      if (allPts.length > 1) map.fitBounds(L.latLngBounds(allPts).pad(0.15));
    }

    // -- Start --
    init().catch(err => {
      document.getElementById('statusDot').style.background = '#f85149';
      document.getElementById('statusInfo').textContent = 'Не удалось подключиться';
      console.error(err);
    });
  </script>
</body>
</html>
